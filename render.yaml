services:
  - type: web
    name: orthophonie-audrey-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_USERNAME
        value: audrey
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://nicolasdibot.github.io
      - key: PUBLIC_BASE_URL
        value: https://orthophonie-audrey-api.onrender.com
      - key: APPOINTMENT_TIMEZONE
        value: Europe/Paris
      - key: ENABLE_API_DOCS
        value: "false"
      - key: FORMSUBMIT_ENABLED
        value: "true"
      - key: CONTACT_SITE_URL
        value: https://nicolasdibot.github.io/orthophonie-audrey-fabre/
      - key: DATABASE_URL
        sync: false
