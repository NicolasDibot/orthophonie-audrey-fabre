services:
  - type: web
    name: orthophonie-audrey-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_USERNAME
        value: audrey
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://nicolasdibot.github.io
      - key: DATABASE_PATH
        value: /var/data/audrey.db
    disk:
      name: orthophonie-audrey-data
      mountPath: /var/data
      sizeGB: 1

